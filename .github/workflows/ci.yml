name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orion
          POSTGRES_PASSWORD: orion
          POSTGRES_DB: orion_test
        options: >-
          --health-cmd "pg_isready -U orion -d orion_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      ORION_DB_HOST: localhost
      ORION_DB_PORT: 5432
      ORION_DB_NAME: orion_test
      ORION_DB_USER: orion
      ORION_DB_PASSWORD: orion
      ORION_JWT_SECRET: ORION_CI_jwt_secret_2026_rotate_me_9f3ab17
      DATABASE_URL: postgresql://orion:orion@localhost:5432/orion_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Prisma generate
        run: pnpm --filter @orion/api prisma:generate

      - name: Prisma deploy
        run: pnpm --filter @orion/api prisma:deploy

      - name: Prisma seed
        run: pnpm --filter @orion/api prisma db seed

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build API
        run: pnpm --filter @orion/api build

      - name: Build Web
        run: pnpm --filter @orion/web build
