name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ORION_DB_PROVIDER: sqlite
      ORION_DATABASE_URL: file:${{ github.workspace }}/.orion/ci.db
      ORION_JWT_SECRET: ORION_CI_jwt_secret_2026_rotate_me_9f3ab17
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prepare SQLite directory
        run: mkdir -p .orion

      - name: Lint
        run: pnpm lint

      - name: Prisma generate
        run: pnpm --filter @orion/api prisma:generate

      - name: Prisma deploy
        run: pnpm --filter @orion/api prisma:deploy

      - name: Prisma seed
        run: pnpm --filter @orion/api prisma db seed

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build API
        run: pnpm --filter @orion/api build

      - name: Build Web
        run: pnpm --filter @orion/web build
